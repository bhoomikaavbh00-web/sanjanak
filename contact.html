<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Sanjana K</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            margin-top: 3rem;
        }
        .contact-info-card {
            background: var(--surface-color);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .info-item i {
            font-size: 1.5rem;
            color: var(--accent-color);
            width: 50px;
            height: 50px;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .contact-form {
            background: var(--surface-color);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }
        @media (max-width: 992px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">SANJANA<span>.K</span></a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="education.html">Education</a></li>
                    <li><a href="certifications.html">Certifications</a></li>
                </ul>
            </nav>
            <a href="contact.html" class="btn btn-primary" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">Contact Me</a>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <h2 class="reveal">Get In <span style="color: var(--accent-color);">Touch</span></h2>
                <p class="reveal" style="margin-top: 1rem; max-width: 600px;">Have a project in mind or just want to say hi? Feel free to reach out!</p>

                <div class="contact-grid">
                    <div class="contact-info-card reveal">
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <div>
                                <h4>Email</h4>
                                <p>contact@sanjanak.com</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-phone"></i>
                            <div>
                                <h4>Phone</h4>
                                <p>+91 98765 43210</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <h4>Location</h4>
                                <p>Bangalore, India</p>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form reveal" style="transition-delay: 0.1s;">
                        <form id="contactForm">
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" placeholder="John Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" placeholder="john@example.com" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" rows="5" placeholder="How can I help you?" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message <i class="fas fa-paper-plane"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="mailto:contact@sanjanak.com"><i class="fas fa-envelope"></i></a>
            </div>
            <p>&copy; 2026 Sanjana K. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you! Your message has been sent successfully.');
            e.target.reset();
        });
    </script>
</body>
</html>
